<!DOCTYPE html>
<html>
<head>
    <title>MyTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <h2>MyTube</h2>
        <input type="text" placeholder="Search">
    </div>

    <div class="videos">

        <div class="card">
            <img src="video1.jpg" alt="Video 1">
            <h3>Travel Vlog</h3>
            <p>1M views</p>
        </div>

        <div class="card">
            <img src="video2.jpg" alt="Video 2">
            <h3>Food Review</h3>
            <p>500K views</p>
        </div>

        <div class="card">
            <img src="video3.jpg" alt="Video 3">
            <h3>Gaming Video</h3>
            <p>900K views</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
